name: Sync Upstream
on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间上午8点自动运行一次
  workflow_dispatch: # 允许手动点击按钮运行

jobs:
  sync_with_upstream:
    runs-on: ubuntu-latest
    name: Sync with Upstream
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Sync upstream
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_checkout_repo: cmliu/edgetunnel
          upstream_checkout_branch: main
          target_checkout_branch: main
